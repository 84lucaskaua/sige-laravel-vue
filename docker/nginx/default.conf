# ============================================================
# Configuração do Nginx
# Ele recebe as requisições e passa para o PHP-FPM (Laravel)
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Pasta pública do Laravel (onde fica o index.php)
    root /var/www/public;
    index index.php index.html;

    # Tenta encontrar o arquivo; se não achar, manda para o index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Quando a URL termina em .php, passa para o PHP-FPM processar
    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Bloqueia acesso a arquivos .htaccess por segurança
    location ~ /\.ht {
        deny all;
    }
}
