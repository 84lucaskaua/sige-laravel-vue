version: "3.8"

# ============================================================
# SIGE - Sistema de Gestão de Estoque
# Docker Compose: sobe o banco, o backend e o frontend juntos
# ============================================================

services:

  # ---- Banco de dados MySQL 8 ----
  banco:
    image: mysql:8.0
    container_name: sige_banco
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: sige
      MYSQL_USER: sige_user
      MYSQL_PASSWORD: sige_pass
    ports:
      - "3306:3306"
    volumes:
      - dados_banco:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rede_sige

  # ---- PHP-FPM (Laravel roda aqui) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sige_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      - banco
    networks:
      - rede_sige

  # ---- Nginx (serve o PHP e o Vue) ----
  nginx:
    image: nginx:alpine
    container_name: sige_nginx
    restart: unless-stopped
    ports:
      - "8000:80"   # backend Laravel em localhost:8000
      - "5173:5173" # frontend Vue em localhost:5173
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - rede_sige

  # ---- Node.js (Vue.js roda aqui) ----
  frontend:
    image: node:20-alpine
    container_name: sige_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - nginx
    networks:
      - rede_sige

# ---- Volume para salvar os dados do banco ----
volumes:
  dados_banco:

# ---- Rede interna entre os serviços ----
networks:
  rede_sige:
    driver: bridge
